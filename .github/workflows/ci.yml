name: CI

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run lint --if-present || true

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python SDK
        run: |
          cd sdks/python
          pip install -e ".[dev]"
      - name: Test import + basic run
        run: |
          cd sdks/python
          python -c "from chainwatch import ChainWatchClient; print('import ok')"
          python examples/basic_scan.py || true   # demo only

  go-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: |
          cd sdks/go
          go mod tidy
          go build -o /tmp/chainwatch-go .
          /tmp/chainwatch-go --help || true

  cpp-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - run: |
          cd sdks/cpp
          mkdir build && cd build
          cmake ..
          cmake --build . -- -j2
          ./chainwatch_cli --help || true

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          cd backend
          pip install -r requirements.txt
          python -c "import app; print('FastAPI backend imports OK')"
